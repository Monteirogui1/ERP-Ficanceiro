{% extends "layouts/base.html" %}
{% block title %}Senha Alterada{% endblock %}
{% block conteudo %}
<div class="content" style="max-width:480px;margin:0 auto">
  <div class="detail-card" style="text-align:center;padding:40px 32px">
    <div style="width:56px;height:56px;border-radius:50%;background:rgba(16,185,129,.12);display:inline-flex;align-items:center;justify-content:center;font-size:24px;color:#10b981;margin-bottom:16px">
      <i class="bi bi-check-circle-fill"></i>
    </div>
    <h2 style="font-size:18px;font-weight:600;margin-bottom:8px">Senha alterada com sucesso!</h2>
    <p style="color:var(--txt-2);font-size:14px;margin-bottom:24px">Sua senha foi atualizada. Use-a no próximo acesso.</p>
    <a href="{% url 'authentication:dashboard' %}" class="btn btn-primary"><i class="bi bi-house"></i> Voltar ao Dashboard</a>
  </div>
</div>
{% endblock %}
