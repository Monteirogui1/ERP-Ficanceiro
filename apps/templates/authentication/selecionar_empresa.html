{% extends "layouts/base.html" %}
{% load static %}

{% block title %}Selecionar Empresa{% endblock %}

{% block conteudo %}
<div class="content">

  <div class="page-header">
    <h1>Selecionar Empresa</h1>
  </div>

  <div class="detail-card" style="max-width:480px">

    <h2><i class="bi bi-building-check"></i> Empresa Ativa</h2>
    <p style="color:#666;font-size:14px;margin:10px 0 20px">
      Escolha a empresa que deseja gerenciar nesta sessão.
    </p>

    <form method="post" id="form-selecionar-empresa">
      {% csrf_token %}

      <div class="form-group">
        <label for="empresa_id">Empresa</label>
        <select name="empresa_id" id="empresa_id" class="form-control">
          {% for ue in empresas_usuario %}
            <option value="{{ ue.empresa.pk }}"
              {% if ue.empresa.pk == empresa_ativa_id %}selected{% endif %}>
              {{ ue.empresa.nome_fantasia|default:ue.empresa.razao_social }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-actions" style="margin-top:24px">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg"></i> Confirmar Seleção
        </button>
      </div>

    </form>

  </div>

</div>
{% endblock %}
