{% comment %}Include de mensagens — {% include "_includes/messages.html" %}{% endcomment %}
{% if messages %}
  {% for msg in messages %}
    <div style="padding:10px 16px;border-radius:5px;margin-bottom:16px;font-size:13px;
      background:{% if 'success' in msg.tags %}#d4edda{% elif 'warning' in msg.tags %}#fff3cd{% else %}#f8d7da{% endif %};
      color:{% if 'success' in msg.tags %}#155724{% elif 'warning' in msg.tags %}#856404{% else %}#721c24{% endif %};
      border:1px solid {% if 'success' in msg.tags %}#c3e6cb{% elif 'warning' in msg.tags %}#ffc107{% else %}#f5c6cb{% endif %};">
      {{ msg }}
    </div>
  {% endfor %}
{% endif %}
